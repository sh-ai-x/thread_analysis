name: PR Review

# Auto-run /dev-kit:review (3-dim) and /dev-kit:security (10-dim OWASP) on every
# PR, in parallel. dev-kit plugin is installed from the consumer-repo
# pattern (git clone via DEV_KIT_GITHUB_TOKEN) because this repo is NOT
# the dev-kit plugin source. Reference: dev-harness-kit origin/main's
# .github/workflows/review.yml.
#
# Severity gate + auto-approve (per claude-review-plugins spec):
#   Approve            (no critical, no major in BOTH review + security) -> success + auto-approve
#   Changes Requested  (any major in either)                              -> failure
#   Blocked            (any critical in either)                           -> failure
#
# Empty-verdict gate: missing verdict = ::warning:: + default Approve.
# The human gate (REVIEW_REQUIRED / CHANGES_REQUESTED on the PR) is what
# actually blocks merge, not a single missing agent verdict.
#
# NO silent-fallback Approve path: when the LLM cannot run (e.g. the
# action's self-protection fires on workflow-modifying PRs), the gate
# tolerates the missing verdict. The dev-harness-kit reference does the
# same.
#
# Secret name MINIMAX_API_KEY is preserved from prior workflow.
#
# Provider selection (pull_request events): controlled by the git-tracked
# file .github/ci-review-provider.txt (one of minimax / anthropic /
# deepseek on its own line, defaults to minimax if missing or empty).
# workflow_dispatch still accepts an explicit review_provider input that
# overrides the file for a single manual run. Each provider requires its
# matching secret: MINIMAX_API_KEY, ANTHROPIC_API_KEY, or DEEPSEEK_API_KEY.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      review_provider:
        description: "Provider for this run (default: .github/ci-review-provider.txt, else minimax)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - minimax
          - anthropic
          - deepseek
      pr_number:
        description: "PR number to review"
        required: false
        type: string

jobs:
  review:
    name: /dev-kit:review (3-dim)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip on bump-PRs (title is chore(release): bump dev-kit to vX.Y.Z).
    if: "!startsWith(github.event.pull_request.title, 'chore(release): bump dev-kit to v')"
    outputs:
      verdict: ${{ steps.extract_verdict.outputs.verdict }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      MINIMAX_BASE_URL: https://api.minimax.io/anthropic
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dev-kit plugin (consumer install)
        env:
          DEV_KIT_GITHUB_TOKEN: ${{ secrets.DEV_KIT_GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.claude/plugins/marketplaces
          # Self-aware install: if the checkout IS the dev-kit plugin
          # (has the manifest + required skills), symlink it. Otherwise
          # (consumer repo), clone via DEV_KIT_GITHUB_TOKEN.
          if [ -f "$GITHUB_WORKSPACE/.claude-plugin/plugin.json" ] \
             && [ -d "$GITHUB_WORKSPACE/skills/review" ] \
             && [ -d "$GITHUB_WORKSPACE/skills/security" ]; then
            ln -sfn "$GITHUB_WORKSPACE" ~/.claude/plugins/marketplaces/dev-kit
            echo "::notice::dev-kit self-install: symlinked $GITHUB_WORKSPACE"
          else
            if [ -z "$DEV_KIT_GITHUB_TOKEN" ]; then
              echo "::error::DEV_KIT_GITHUB_TOKEN secret is required for consumer-install."
              echo "  Provision a fine-grained PAT with contents:read on"
              echo "  sh-ai-x/dev-harness-kit and set it as a repo secret named"
              echo "  DEV_KIT_GITHUB_TOKEN in this repo's Settings -> Secrets."
              exit 1
            fi
            echo "::notice::dev-kit consumer-install: cloning sh-ai-x/dev-harness-kit via DEV_KIT_GITHUB_TOKEN"
            git clone --depth 1 \
              "https://x-access-token:${DEV_KIT_GITHUB_TOKEN}@github.com/sh-ai-x/dev-harness-kit.git" \
              ~/.claude/plugins/marketplaces/dev-kit
          fi
          test -f ~/.claude/plugins/marketplaces/dev-kit/.claude-plugin/plugin.json
          test -d ~/.claude/plugins/marketplaces/dev-kit/skills/review
          test -d ~/.claude/plugins/marketplaces/dev-kit/skills/security
          echo "dev-kit plugin installed: $(readlink ~/.claude/plugins/marketplaces/dev-kit || echo 'real')"

      - name: Resolve PR + provider
        id: provider
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            provider="${{ github.event.inputs.review_provider }}"
            [ -z "${{ github.event.inputs.pr_number }}" ] && { echo "::error::pr_number required"; exit 1; }
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            provider="$(tr -d '[:space:]' < .github/ci-review-provider.txt 2>/dev/null || true)"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi
          echo "provider=${provider:-minimax}" >> "$GITHUB_OUTPUT"

      - name: Run /dev-kit:review via MiniMax
        if: steps.provider.outputs.provider == 'minimax'
        env:
          ANTHROPIC_BASE_URL: ${{ env.MINIMAX_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_MODEL: 'MiniMax-M3[1m]'
          ANTHROPIC_DEFAULT_SONNET_MODEL: 'MiniMax-M3[1m]'
          ANTHROPIC_DEFAULT_OPUS_MODEL: 'MiniMax-M3[1m]'
          ANTHROPIC_DEFAULT_HAIKU_MODEL: 'MiniMax-M3[1m]'
        uses: anthropics/claude-code-action@v1
        with:
          track_progress: ${{ github.event_name == 'pull_request' }}
          prompt: |
            /dev-kit:review --diff ${{ github.repository }}/pull/${{ steps.provider.outputs.pr_number }}

            Render the standard two-layer output (PR summary at top, per-finding
            inline comments). The summary MUST begin with a single line exactly
            of the form:

              **Verdict:** Approve
              **Verdict:** Changes Requested
              **Verdict:** Blocked

            Map verdict strictly to severity (do NOT inflate):
              - critical >= 1              -> **Verdict:** Blocked
              - major >= 1, critical = 0   -> **Verdict:** Changes Requested
              - no critical, no major      -> **Verdict:** Approve
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"

      - name: Run /dev-kit:review via Claude Code opt-in
        if: steps.provider.outputs.provider == 'anthropic'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: ${{ github.event_name == 'pull_request' }}
          prompt: |
            /dev-kit:review --diff ${{ github.repository }}/pull/${{ steps.provider.outputs.pr_number }}

            Render the standard two-layer output. The summary MUST begin with:

              **Verdict:** Approve
              **Verdict:** Changes Requested
              **Verdict:** Blocked
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"

      - name: Run /dev-kit:review via DeepSeek
        if: steps.provider.outputs.provider == 'deepseek'
        env:
          ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
          ANTHROPIC_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_MODEL: 'deepseek-v4-pro'
          ANTHROPIC_DEFAULT_SONNET_MODEL: 'deepseek-v4-flash'
          ANTHROPIC_DEFAULT_OPUS_MODEL: 'deepseek-v4-pro'
          ANTHROPIC_DEFAULT_HAIKU_MODEL: 'deepseek-v4-flash'
        uses: anthropics/claude-code-action@v1
        with:
          track_progress: ${{ github.event_name == 'pull_request' }}
          prompt: |
            /dev-kit:review --diff ${{ github.repository }}/pull/${{ steps.provider.outputs.pr_number }}

            Render the standard two-layer output. The summary MUST begin with:

              **Verdict:** Approve
              **Verdict:** Changes Requested
              **Verdict:** Blocked
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"

      - name: Extract review verdict
        id: extract_verdict
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          set -uo pipefail
          # Most recent claude[bot] comment that contains a **Verdict:** line.
          # In track_progress mode the action updates ONE comment per job, so
          # "most recent" = this job's comment.
          verdict="$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select((.user.login // "") | startswith("claude")) | .body' \
            | grep -E '\*\*Verdict:\*\*' | tail -1 \
            | grep -oE '\*\*Verdict:\*\*\s*(Approve|Blocked|Changes Requested)' \
            | awk '{print $NF}' || true)"
          echo "review_verdict=${verdict:-<none>}"
          echo "verdict=${verdict:-}" >> "$GITHUB_OUTPUT"

  security:
    name: /dev-kit:security (10-dim OWASP)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: "!startsWith(github.event.pull_request.title, 'chore(release): bump dev-kit to v')"
    outputs:
      verdict: ${{ steps.extract_verdict.outputs.verdict }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      MINIMAX_BASE_URL: https://api.minimax.io/anthropic
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dev-kit plugin (consumer install)
        env:
          DEV_KIT_GITHUB_TOKEN: ${{ secrets.DEV_KIT_GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.claude/plugins/marketplaces
          if [ -f "$GITHUB_WORKSPACE/.claude-plugin/plugin.json" ] \
             && [ -d "$GITHUB_WORKSPACE/skills/review" ] \
             && [ -d "$GITHUB_WORKSPACE/skills/security" ]; then
            ln -sfn "$GITHUB_WORKSPACE" ~/.claude/plugins/marketplaces/dev-kit
            echo "::notice::dev-kit self-install: symlinked $GITHUB_WORKSPACE"
          else
            if [ -z "$DEV_KIT_GITHUB_TOKEN" ]; then
              echo "::error::DEV_KIT_GITHUB_TOKEN secret is required for consumer-install."
              exit 1
            fi
            echo "::notice::dev-kit consumer-install: cloning sh-ai-x/dev-harness-kit via DEV_KIT_GITHUB_TOKEN"
            git clone --depth 1 \
              "https://x-access-token:${DEV_KIT_GITHUB_TOKEN}@github.com/sh-ai-x/dev-harness-kit.git" \
              ~/.claude/plugins/marketplaces/dev-kit
          fi
          test -f ~/.claude/plugins/marketplaces/dev-kit/.claude-plugin/plugin.json
          test -d ~/.claude/plugins/marketplaces/dev-kit/skills/review
          test -d ~/.claude/plugins/marketplaces/dev-kit/skills/security
          echo "dev-kit plugin installed: $(readlink ~/.claude/plugins/marketplaces/dev-kit || echo 'real')"

      - name: Resolve PR + provider
        id: provider
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            provider="${{ github.event.inputs.review_provider }}"
            [ -z "${{ github.event.inputs.pr_number }}" ] && { echo "::error::pr_number required"; exit 1; }
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            provider="$(tr -d '[:space:]' < .github/ci-review-provider.txt 2>/dev/null || true)"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi
          echo "provider=${provider:-minimax}" >> "$GITHUB_OUTPUT"

      - name: Run /dev-kit:security via MiniMax
        if: steps.provider.outputs.provider == 'minimax'
        env:
          ANTHROPIC_BASE_URL: ${{ env.MINIMAX_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_MODEL: 'MiniMax-M3[1m]'
          ANTHROPIC_DEFAULT_SONNET_MODEL: 'MiniMax-M3[1m]'
          ANTHROPIC_DEFAULT_OPUS_MODEL: 'MiniMax-M3[1m]'
          ANTHROPIC_DEFAULT_HAIKU_MODEL: 'MiniMax-M3[1m]'
        uses: anthropics/claude-code-action@v1
        with:
          track_progress: ${{ github.event_name == 'pull_request' }}
          prompt: |
            /dev-kit:security --diff ${{ github.repository }}/pull/${{ steps.provider.outputs.pr_number }}

            Render the security summary (per-category breakdown table + Verdict).
            The summary MUST begin with a single line exactly of the form:

              **Verdict:** Approve
              **Verdict:** Changes Requested
              **Verdict:** Blocked

            Map verdict per spec:
              - critical >= 1              -> **Verdict:** Blocked
              - major >= 1, critical = 0   -> **Verdict:** Changes Requested
              - no critical, no major      -> **Verdict:** Approve
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"

      - name: Run /dev-kit:security via Claude Code opt-in
        if: steps.provider.outputs.provider == 'anthropic'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: ${{ github.event_name == 'pull_request' }}
          prompt: |
            /dev-kit:security --diff ${{ github.repository }}/pull/${{ steps.provider.outputs.pr_number }}

            Render the security summary. The summary MUST begin with:

              **Verdict:** Approve
              **Verdict:** Changes Requested
              **Verdict:** Blocked
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"

      - name: Run /dev-kit:security via DeepSeek
        if: steps.provider.outputs.provider == 'deepseek'
        env:
          ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
          ANTHROPIC_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_MODEL: 'deepseek-v4-pro'
          ANTHROPIC_DEFAULT_SONNET_MODEL: 'deepseek-v4-flash'
          ANTHROPIC_DEFAULT_OPUS_MODEL: 'deepseek-v4-pro'
          ANTHROPIC_DEFAULT_HAIKU_MODEL: 'deepseek-v4-flash'
        uses: anthropics/claude-code-action@v1
        with:
          track_progress: ${{ github.event_name == 'pull_request' }}
          prompt: |
            /dev-kit:security --diff ${{ github.repository }}/pull/${{ steps.provider.outputs.pr_number }}

            Render the security summary. The summary MUST begin with:

              **Verdict:** Approve
              **Verdict:** Changes Requested
              **Verdict:** Blocked
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"

      - name: Extract security verdict
        id: extract_verdict
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          set -uo pipefail
          verdict="$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select((.user.login // "") | startswith("claude")) | .body' \
            | grep -E '\*\*Verdict:\*\*' | tail -1 \
            | grep -oE '\*\*Verdict:\*\*\s*(Approve|Blocked|Changes Requested)' \
            | awk '{print $NF}' || true)"
          echo "security_verdict=${verdict:-<none>}"
          echo "verdict=${verdict:-}" >> "$GITHUB_OUTPUT"

  gate:
    name: severity gate (review + security)
    runs-on: ubuntu-latest
    needs: [review, security]
    if: |
      always() &&
      !startsWith(github.event.pull_request.title, 'chore(release): bump dev-kit to v')
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - name: Combined verdict gate
        run: |
          R="${{ needs.review.outputs.verdict }}"
          S="${{ needs.security.outputs.verdict }}"
          EVENT="$EVENT_NAME"
          echo "review=$R  security=$S"

          # Tolerate missing verdicts in BOTH event modes. The previous
          # strict pull_request branch hard-failed on empty R or S, which
          # broke any PR whose agent skipped (workflow-validation skip on
          # the very PR that ADDS .github/workflows/review.yml, action
          # rate-limit, transient network error). The fix: default to
          # Approve + ::warning:: in both modes so the human gate
          # (REVIEW_REQUIRED / CHANGES_REQUESTED on the PR) is what
          # actually blocks merge, not a single missing agent verdict.
          [ -z "$R" ] && { echo "::warning::review verdict missing (event=$EVENT); defaulting to Approve"; R="Approve"; }
          [ -z "$S" ] && { echo "::warning::security verdict missing (event=$EVENT); defaulting to Approve"; S="Approve"; }

          # worst-of wins
          rank() { case "$1" in Blocked) echo 2 ;; "Changes"*) echo 1 ;; Approve) echo 0 ;; *) echo 99 ;; esac; }
          r=$(rank "$R"); s=$(rank "$S")
          worst=$([ "$r" -ge "$s" ] && echo "$R" || echo "$S")
          echo "Combined worst verdict: $worst"

          # Tolerate unparseable verdicts: treat as non-blocking.
          if ! { [ "$worst" = "Approve" ] || [ "$worst" = "Changes Requested" ] || [ "$worst" = "Blocked" ]; }; then
            echo "::warning::Unparseable verdict '$worst' (review='$R' security='$S'); treating as non-blocking."
            exit 0
          fi

          case "$worst" in
            Approve) exit 0 ;;
            "Changes"*) echo "::error::Changes Requested (review=$R security=$S)"; exit 1 ;;
            Blocked) echo "::error::Blocked (review=$R security=$S)"; exit 1 ;;
          esac
